<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUL AZAD | Digital Vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        
        body { 
            background: #000; 
            color: #D4AF37; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden;
        }

        /* Matrix Background Canvas */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        /* HEADER GLITCH EFFECT */
        .header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); }
        
        .main-title { 
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(3rem, 15vw, 8rem); 
            font-weight: 900; 
            letter-spacing: 20px;
            position: relative;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #D4AF37, 0 0 20px #D4AF37; }
            to { text-shadow: 0 0 30px #D4AF37, 0 0 50px #FAD02C; }
        }

        .subtitle { font-size: 1.2rem; letter-spacing: 5px; color: #aaa; margin-top: -10px; text-transform: uppercase; }

        /* SECTIONS CONTAINER */
        .section-container { padding: 50px 20px; max-width: 1400px; margin: 0 auto; }
        .section-name { font-size: 2rem; border-left: 5px solid #D4AF37; padding-left: 15px; margin: 60px 0 30px; text-transform: uppercase; letter-spacing: 3px; }

        /* IMAGE SLOTS (EMPTY FOR YOU) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        .image-slot {
            height: 400px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            backdrop-filter: blur(5px);
        }

        .image-slot::before {
            content: "ADD IMAGE HERE";
            font-size: 0.8rem;
            color: rgba(212, 175, 55, 0.2);
        }

        .image-slot:hover {
            border: 1px solid #D4AF37;
            transform: translateY(-10px) rotateY(10deg);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            background: rgba(212, 175, 55, 0.05);
        }

        /* LIGHTING EFFECT ON MOUSE */
        .cursor-light {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="cursor-light" id="light"></div>

<header class="header">
    <h1 class="main-title">GUL AZAD</h1>
    <p class="subtitle">Personal Memory Archive // Secured</p>
</header>

<div class="section-container">
    
    <div class="section-name">01. THE LEGACY</div>
    <div class="grid">
        <div class="image-slot"></div>
        <div class="image-slot"></div>
        <div class="image-slot"></div>
    </div>

    <div class="section-name">02. UNTOLD MOMENTS</div>
    <div class="grid">
        <div class="image-slot"></div>
        <div class="image-slot"></div>
        <div class="image-slot"></div>
    </div>

    <div class="section-name">03. THE JOURNEY</div>
    <div class="grid">
        <div class="image-slot"></div>
        <div class="image-slot"></div>
        <div class="image-slot"></div>
    </div>

</div>

<script>
    // Matrix Background Animation
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%';
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#D4AF37';
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < rainDrops.length; i++) {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
            if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
            rainDrops[i]++;
        }
    }
    setInterval(draw, 30);

    // Mouse Light Effect
    const light = document.getElementById('light');
    document.addEventListener('mousemove', (e) => {
        light.style.left = e.clientX - 200 + 'px';
        light.style.top = e.clientY - 200 + 'px';
    });
</script>

</body>
</html>
