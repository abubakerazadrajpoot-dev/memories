<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUL AZAD | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* ROYAL INTRO ANIMATION */
        .intro-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: flex;
            justify-content: center; align-items: center;
            animation: curtainUp 2.5s cubic-bezier(0.9, 0, 0.1, 1) forwards 3s;
        }

        .intro-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 10vw, 5rem);
            color: #D4AF37;
            letter-spacing: 25px;
            opacity: 0;
            animation: royalReveal 2.5s ease-out forwards 0.5s;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        @keyframes royalReveal {
            0% { opacity: 0; letter-spacing: 40px; filter: blur(15px); transform: scale(1.1); }
            100% { opacity: 1; letter-spacing: 15px; filter: blur(0); transform: scale(1); }
        }

        @keyframes curtainUp {
            to { transform: translateY(-100%); visibility: hidden; }
        }

        /* MAIN WEBSITE LOOK */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            position: relative;
        }

        .main-logo {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 12vw, 6rem);
            color: #D4AF37;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gold-line {
            width: 0; height: 1px; background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            animation: lineExpand 2s forwards 3.5s;
        }

        @keyframes lineExpand { to { width: 300px; } }

        /* LUXURY PHOTO SECTIONS */
        .gallery-container { max-width: 1400px; margin: 0 auto; padding: 100px 20px; }

        .section-header {
            font-family: 'Cinzel', serif;
            font-size: 2rem; color: #D4AF37;
            text-align: center; margin-bottom: 60px;
            letter-spacing: 5px; text-transform: uppercase;
        }

        .luxury-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 40px; margin-bottom: 120px;
        }

        .photo-frame {
            height: 500px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.15);
            position: relative;
            transition: 0.7s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden;
        }

        .photo-frame:hover {
            border-color: #D4AF37;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.2);
            transform: translateY(-15px);
        }

        .photo-frame::before {
            content: 'PREVIEW';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.7rem; letter-spacing: 3px; color: rgba(212, 175, 55, 0.2);
        }

        /* SOFT AMBIENT BACKGROUND */
        .ambient-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #111, #000);
        }
    </style>
</head>
<body>

<div class="intro-overlay">
    <h1 class="intro-name">GUL AZAD</h1>
</div>

<div class="ambient-glow"></div>

<header>
    <h1 class="main-logo">GUL AZAD</h1>
    <div class="gold-line"></div>
</header>

<div class="gallery-container">

    <h2 class="section-header">Exclusive Collection</h2>
    <div class="luxury-grid">
        <a href="page1.html" style="text-decoration: none; display: block;">
            <div class="photo-frame" style="display: flex; align-items: center; justify-content: center; background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37;">
                <h3 style="color: #D4AF37; font-family: 'Cinzel', serif;">OPEN PAGE 1</h3>
            </div>
        </a>
    </div>

    <h2 class="section-header">Golden Memories</h2>
    <div class="luxury-grid">
        <a href="page2.html" style="text-decoration: none; display: block;">
            <div class="photo-frame" style="display: flex; align-items: center; justify-content: center; background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37;">
                <h3 style="color: #D4AF37; font-family: 'Cinzel', serif;">OPEN PAGE 2</h3>
            </div>
        </a>
    </div>

    <h2 class="section-header">Special Moments</h2>
    <div class="luxury-grid">
        <a href="page3.html" style="text-decoration: none; display: block;">
            <div class="photo-frame" style="display: flex; align-items: center; justify-content: center; background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37;">
                <h3 style="color: #D4AF37; font-family: 'Cinzel', serif;">OPEN PAGE 3</h3>
            </div>
        </a>
    </div>

</div>

</body>
</html>
