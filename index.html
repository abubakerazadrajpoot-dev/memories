<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad's Memories | Premium Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #050505; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }

        /* Animated Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 50px 20px; }

        h1 {
            text-align: center;
            font-size: 3rem;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 50px;
            animation: fadeInDown 1.5s ease-out;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(10px);
            transform: translateY(100px);
            opacity: 0;
            animation: slideUp 0.8s forwards;
            transition: 0.5s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03) !important;
            border-color: #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img { transform: scale(1.1); }

        .info {
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            position: absolute;
            bottom: 0; width: 100%;
        }

        .info h3 { color: #D4AF37; font-size: 1.2rem; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) { h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="container">
    <h1>Dad's Memories</h1>
    <div class="gallery-grid" id="gallery">
        </div>
</div>

<script>
    // Matrix-like background animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    for(let i=0; i<50; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 1 + 0.5
        });
    }

    function animateBg() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#D4AF37';
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            p.y += p.speed;
            if(p.y > canvas.height) p.y = 0;
        });
        requestAnimationFrame(animateBg);
    }
    animateBg();

    // Images Array
    const images = [
        { src: "https://images.unsplash.com/photo-1506744038136-46273834b3fb", title: "Legacy" },
        { src: "https://images.unsplash.com/photo-1511367461989-f85a21fda167", title: "Moments" },
        { src: "https://images.unsplash.com/photo-1493246507139-91e8bef99c02", title: "Journey" },
        { src: "https://images.unsplash.com/photo-1473081556163-2a1713397360", title: "Strength" },
        { src: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", title: "Adventure" },
        { src: "https://images.unsplash.com/photo-1501785888041-af3ef285b470", title: "Wisdom" }
    ];

    const gallery = document.getElementById('gallery');
    images.forEach((img, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.animationDelay = `${index * 0.2}s`;
        card.innerHTML = `
            <img src="${img.src}" alt="${img.title}">
            <div class="info">
                <h3>${img.title}</h3>
            </div>
        `;
        gallery.appendChild(card);
    });
</script>

</body>
</html>
